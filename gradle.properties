# The Gradle daemon (and its Kotlin DSL compiler) must run on a JDK it
# understands; some machine defaults (e.g. GraalVM 26) cannot parse the bundled
# Kotlin. The daemon JVM is selected by toolchain criteria in
# gradle/gradle-daemon-jvm.properties (Temurin/HotSpot 21, auto-detected from
# installed JDKs) rather than a machine-specific absolute path. The *compile*
# toolchain is selected independently in build.gradle.kts and resolves to the
# same JDK via Gradle toolchain auto-detection.
org.gradle.caching=true
